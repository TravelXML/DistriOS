services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: districore
      POSTGRES_USER: districore
      POSTGRES_PASSWORD: districore
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U districore"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  app:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: districore
      DB_USER: districore
      DB_PASSWORD: districore
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: secret-key-should-be-replaced
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  db_data:

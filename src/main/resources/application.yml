spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:districore}
    username: ${DB_USER:districore}
    password: ${DB_PASSWORD:districore}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
jwt:
  secret: secret-key-should-be-replaced
  expiration-ms: 3600000
  refresh-expiration-ms: 86400000
app:
  base-path: /api/v1
  allowed-origins: "*"
logging:
  level:
    root: INFO
    com.districore.platform: DEBUG
